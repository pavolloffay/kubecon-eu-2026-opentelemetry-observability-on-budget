apiVersion: v1
kind: Namespace
metadata:
  name: tutorial-application
  annotations:
    kubecon-tutorial: otel-metrics
---
apiVersion: opentelemetry.io/v1alpha1
kind: Instrumentation
metadata:
  name: my-instrumentation
  namespace: tutorial-application
spec:
  exporter:
    endpoint: http://otel-collector.tutorial-application.svc.cluster.local:4317
  propagators:
    - tracecontext
    - baggage
    - b3
  sampler:
    type: parentbased_traceidratio
    argument: "1"
#    type: parentbased_jaeger_remote
#    argument: "endpoint=http://otel-collector.tutorial-application.svc.cluster.local:5778/sampling"
  resource:
    addK8sUIDAttributes: true
  python:
    env:
      # Required if endpoint is set to 4317.
      # Python autoinstrumentation uses http/proto by default
      # so data must be sent to 4318 instead of 4317.
      - name: OTEL_EXPORTER_OTLP_ENDPOINT
        value: http://otel-collector.tutorial-application.svc.cluster.local:4318
      - name: OTEL_LOGS_EXPORTER
        value: otlp
      - name: OTEL_PYTHON_LOGGING_AUTO_INSTRUMENTATION_ENABLED
        value: "true"
#      - name: OTEL_PYTHON_EXCLUDED_URLS
#        value: "*/health"
  nodejs:
    env:
      # Required if endpoint is set to 4317.
      # Node.js autoinstrumentation uses http/proto by default
      # so data must be sent to 4318 instead of 4317.
      - name: OTEL_EXPORTER_OTLP_ENDPOINT
        value: http://otel-collector.tutorial-application.svc.cluster.local:4318
  java:
    env:
      - name: OTEL_LOGS_EXPORTER
        value: otlp
