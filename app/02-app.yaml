---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: tutorial-application
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
      annotations:
        prometheus.io/scrape: "true"
        instrumentation.opentelemetry.io/inject-nodejs: "true"
    spec:
      containers:
      - name: frontend
        image: ghcr.io/pavolloffay/kubecon-eu-2026-opentelemetry-observability-on-budget-frontend:latest
        imagePullPolicy: IfNotPresent
        env:
          - name: BACKEND1_URL
            value: "http://backend1-service:5000/rolldice"
          - name: BACKEND2_URL
            value: "http://backend2-service:5165/rolldice"
          - name: BACKEND3_URL
            value: "http://backend3-service:5165/rolldice"
        ports:
        - containerPort: 4000
        livenessProbe:
          httpGet:
            path: /health
            port: 4000
          initialDelaySeconds: 5
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 4000
          initialDelaySeconds: 1
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: tutorial-application
  labels:
    app: frontend
  annotations:
    prometheus.io/scrape: "true"
spec:
  ports:
  - name: http
    port: 4000
    targetPort: 4000
  selector:
    app: frontend
