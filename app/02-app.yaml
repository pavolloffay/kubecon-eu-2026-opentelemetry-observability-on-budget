apiVersion: v1
kind: Namespace
metadata:
  name: tutorial-application
  annotations:
    kubecon-tutorial: otel-metrics
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend1-deployment
  namespace: tutorial-application
  labels:
    app: backend1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend1
  template:
    metadata:
      labels:
        app: backend1
      annotations:
        prometheus.io/scrape: "true"
        instrumentation.opentelemetry.io/inject-python: "true"
    spec:
      containers:
      - name: backend1
        image: ghcr.io/pavolloffay/kubecon-eu-2026-opentelemetry-observability-on-budget-backend1:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5000
          name: service
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 1
---
apiVersion: v1
kind: Service
metadata:
  name: backend1-service
  namespace: tutorial-application
  labels:
    app: backend1
  annotations:
    prometheus.io/scrape: "true"
spec:
  ports:
  - name: http
    port: 5000
    targetPort: 5000
  selector:
    app: backend1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend2-deployment
  namespace: tutorial-application
  labels:
    app: backend2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend2
  template:
    metadata:
      labels:
        app: backend2
      annotations:
        prometheus.io/scrape: "true"
        instrumentation.opentelemetry.io/inject-java: "true"
    spec:
      containers:
      - name: backend2
        image: ghcr.io/pavolloffay/kubecon-eu-2026-opentelemetry-observability-on-budget-backend2:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5165
        livenessProbe:
          httpGet:
            path: /health
            port: 5165
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 5165
          initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: backend2-service
  namespace: tutorial-application
  labels:
    app: backend2
  annotations:
    prometheus.io/scrape: "true"
spec:
  ports:
  - name: http
    port: 5165
    targetPort: 5165
  selector:
    app: backend2
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend3-deployment
  namespace: tutorial-application
  labels:
    app: backend3
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend3
  template:
    metadata:
      labels:
        app: backend3
      annotations:
        prometheus.io/scrape: "true"
