apiVersion: apps/v1
kind: Deployment
metadata:
  name: loadgen-deployment
  namespace: tutorial-application
  labels:
    app: loadgen
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loadgen
  template:
    metadata:
      labels:
        app: loadgen
    spec:
      containers:
      - name: loadgen
        image: curlimages/curl:latest
        env:
          - name: URL
            value: "http://frontend-service:4000/"
          - name: SLOWDOWN_IN_SECONDS
            value: "3"
        command: ["/bin/sh", "-c"]
        args:
          - |
            while true; do
              MAX=$(( ($(od -An -tu4 -N4 /dev/urandom | tr -d ' ') % 30) + 10 ))
              for i in $(seq 1 ${MAX}); do
                PLAYERS=$(printf 'Pavol\nBenedikt\nYuri\nKristina\nSeverin' | shuf)
                P1=$(echo "$PLAYERS" | sed -n '1p')
                P2=$(echo "$PLAYERS" | sed -n '2p')
                P3=$(echo "$PLAYERS" | sed -n '3p')
                timeout 5 curl -s "${URL}?player1=${P1}&player2=${P2}&player3=${P3}" &
                sleep 1
              done
              wait
              sleep ${SLOWDOWN_IN_SECONDS}
            done
